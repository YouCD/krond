name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build module zip (APK + 注入版本 + 打包)
        run: bash build-module.sh

      - name: Save update.json for later sync
        run: cp update.json /tmp/update.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: crond_injector.zip
          generate_release_notes: true

      - name: Sync update.json to default branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin "${{ github.event.repository.default_branch }}"
          git checkout "${{ github.event.repository.default_branch }}"
          cp /tmp/update.json update.json
          if git diff --quiet update.json; then
            echo "update.json unchanged"
          else
            git add update.json
            git commit -m "chore: update update.json to ${{ github.ref_name }}"
            git push
          fi
