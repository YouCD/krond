name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build module zip (APK + 注入版本 + 打包)
        run: bash build-module.sh

      - name: Save update.json for later sync
        run: cp update.json /tmp/update.json

      - name: Generate release notes
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ github.ref_name }}"^ 2>/dev/null || echo "")
          {
            echo 'notes<<EOF'
            echo "## 变更"
            echo ""
            if [ -z "$PREV_TAG" ]; then
              git log --pretty=format:"- %s" "${{ github.ref_name }}"
            else
              git log --pretty=format:"- %s" "$PREV_TAG..${{ github.ref_name }}"
            fi
            echo ""
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "**完整比较**: [$PREV_TAG...${{ github.ref_name }}](https://github.com/${{ github.repository }}/compare/$PREV_TAG...${{ github.ref_name }})"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: crond_injector.zip
          body: ${{ steps.changelog.outputs.notes }}

      - name: Sync update.json to default branch
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git fetch origin "${{ github.event.repository.default_branch }}"
          git checkout "${{ github.event.repository.default_branch }}"
          cp /tmp/update.json update.json
          if git diff --quiet update.json; then
            echo "update.json unchanged"
          else
            git add update.json
            git commit -m "chore: update update.json to ${{ github.ref_name }}"
            git push
          fi
