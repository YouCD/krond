name: Build krond + App & KernelSU Module

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK/NDK packages
        run: |
          yes | sdkmanager --licenses >/dev/null 2>&1 || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" "ndk;27.0.12077973"

      - name: Prepare signing keystore
        id: sign
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KS_KPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KS_B64" ]; then
            echo "$KS_B64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "file=$RUNNER_TEMP/release.keystore" >> "$GITHUB_OUTPUT"
            echo "pass=$KS_PASS" >> "$GITHUB_OUTPUT"
            echo "alias=$KS_ALIAS" >> "$GITHUB_OUTPUT"
            echo "kpass=$KS_KPASS" >> "$GITHUB_OUTPUT"
          else
            mkdir -p ~/.android
            keytool -genkeypair -v -keystore ~/.android/debug.keystore -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android -dname "CN=Android Debug,O=Android,C=US"
            echo "file=$HOME/.android/debug.keystore" >> "$GITHUB_OUTPUT"
            echo "pass=android" >> "$GITHUB_OUTPUT"
            echo "alias=androiddebugkey" >> "$GITHUB_OUTPUT"
            echo "kpass=android" >> "$GITHUB_OUTPUT"
          fi

      - name: Build module (krond + APK + zip)
        env:
          KEYSTORE_FILE: ${{ steps.sign.outputs.file }}
          KEYSTORE_PASSWORD: ${{ steps.sign.outputs.pass }}
          KEY_ALIAS: ${{ steps.sign.outputs.alias }}
          KEY_PASSWORD: ${{ steps.sign.outputs.kpass }}
          GH_RELEASE: ${{ secrets.GH_RELEASE }}
        run: bash build-module.sh

      - name: Upload module zip
        uses: actions/upload-artifact@v4
        with:
          name: krond_injector
          path: krond_injector.zip

      - name: Upload app APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: krond_app/app/build/outputs/apk/release/app-release.apk
