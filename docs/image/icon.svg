<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3DDC84;stop-opacity:1" /> <!-- Android Green -->
      <stop offset="100%" style="stop-color:#2A9D5C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clockGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2D3748;stop-opacity:1" /> <!-- Dark Gray -->
      <stop offset="100%" style="stop-color:#1A202C;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角矩形 -->
  <rect x="20" y="20" width="472" height="472" rx="100" ry="100" fill="url(#bgGradient)" />

  <!-- 内部深色圆形（模拟时钟表盘） -->
  <circle cx="256" cy="256" r="180" fill="url(#clockGradient)" stroke="#FFFFFF" stroke-width="8" />

  <!-- Crontab 星号符号 (代表定时任务) -->
  <g transform="translate(256, 256)">
    <!-- 第一个星号 -->
    <text x="-120" y="-40" font-family="monospace" font-size="60" fill="#3DDC84" text-anchor="middle">*</text>
    <!-- 第二个星号 -->
    <text x="-60" y="-40" font-family="monospace" font-size="60" fill="#3DDC84" text-anchor="middle">*</text>
    <!-- 第三个星号 -->
    <text x="0" y="-40" font-family="monospace" font-size="60" fill="#3DDC84" text-anchor="middle">*</text>
    <!-- 第四个星号 -->
    <text x="60" y="-40" font-family="monospace" font-size="60" fill="#3DDC84" text-anchor="middle">*</text>
    <!-- 第五个星号 -->
    <text x="120" y="-40" font-family="monospace" font-size="60" fill="#3DDC84" text-anchor="middle">*</text>
    
    <!-- 命令提示符 >_ -->
    <text x="0" y="80" font-family="monospace" font-weight="bold" font-size="70" fill="#FFFFFF" text-anchor="middle">&gt;_</text>
  </g>

  <!-- 时钟指针 (象征时间流逝) -->
  <line x1="256" y1="256" x2="256" y2="140" stroke="#FFFFFF" stroke-width="12" stroke-linecap="round" />
  <line x1="256" y1="256" x2="340" y2="256" stroke="#3DDC84" stroke-width="12" stroke-linecap="round" />
  
  <!-- 中心点 -->
  <circle cx="256" cy="256" r="15" fill="#3DDC84" />
</svg>